<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Project</title>
</head>
<body>

    <style>

         body{
            font-family: Arial;
            font-size: 1.1rem;
        }

        .css-subscribe-btn{
            margin: 10px;
            padding: 10px;
            padding-left: 15px;
            padding-right: 15px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            background-color: black;
            color: white;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .is-subscribed{
            background-color: rgb(236, 236, 236);
            color: black;
        }

        .css-cost-btn{
            padding: 10px;
            font-size: 1rem;
        }
        

        .css-calculate-btn{
            padding: 10px;
            font-size: 1rem;
            border: none;
            background-color: green;
            color: white;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
    
    <p>You Tube Subscribe Button</p>
    <button  onclick="
    Subscribe();
    " class="js-subscribe-btn  css-subscribe-btn">
    Subscribe</button>

    <p>Amazon Shipping Calculator :</p>
    <p>Orders under $40 = +$10 shipping.</p>
    <p>Orders over $40 = FREE shipping.</p>
    <input type="text" placeholder="Cost of order" class="js-cost css-cost-btn" onkeydown="
    handleEvent(event);" >

    
    


    <button onclick="
    totalCostCalculator();
    " class="css-calculate-btn" >Calculate</button>

    <p class="js-total-cost"></p>


    <script>

        function handleEvent(){
            if(event.key === 'Enter'){
            totalCostCalculator();
    }

        }



    function totalCostCalculator(){

      const TotalCost=  document.querySelector('.js-cost');
      let cost =Number(TotalCost.value);
            console.log(cost)
      if (cost <40){
        cost+=10;
        console.log(cost);
      }
      document.querySelector('.js-total-cost').innerHTML = `$${cost}`
    }

    function Subscribe(){
        const subscribeBtn = document.querySelector('.js-subscribe-btn');
    if(subscribeBtn.innerHTML === 'Subscribe'){
       subscribeBtn.innerHTML = 'Subscribed';
       subscribeBtn.classList.add('is-subscribed')
    }
    else{
        subscribeBtn.innerHTML='Subscribe';
        subscribeBtn.classList.remove('is-subscribed');
    }
    }
    </script>
</body>
</html>
